name: Build Pre-Built Release

on:
  push:
    branches: [main]
    paths:
      - "setup-all.sh"
      - "setup-desktop-prebuilt.sh"
      - "setup-performance.sh"
      - ".github/workflows/build-release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-rootfs:
    name: Build Ubuntu ARM64 Rootfs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo apt-get clean
          df -h

      - name: Install QEMU and ARM64 tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qemu-user-static \
            debootstrap \
            binfmt-support
          sudo update-binfmts --enable qemu-aarch64 || true

      - name: Create ARM64 Ubuntu rootfs
        run: |
          echo "Building Ubuntu 22.04 ARM64 rootfs..."
          sudo mkdir -p /opt/rootfs
          sudo debootstrap \
            --arch=arm64 \
            --variant=minbase \
            --include=ca-certificates,curl,wget,gnupg,locales \
            jammy \
            /opt/rootfs \
            http://ports.ubuntu.com/ubuntu-ports/
          echo "Base rootfs created"

      - name: Configure apt sources
        run: |
          echo "deb http://ports.ubuntu.com/ubuntu-ports/ jammy main restricted universe multiverse" | sudo tee /opt/rootfs/etc/apt/sources.list
          echo "deb http://ports.ubuntu.com/ubuntu-ports/ jammy-updates main restricted universe multiverse" | sudo tee -a /opt/rootfs/etc/apt/sources.list
          echo "deb http://ports.ubuntu.com/ubuntu-ports/ jammy-security main restricted universe multiverse" | sudo tee -a /opt/rootfs/etc/apt/sources.list

      - name: Install packages in chroot
        run: |
          sudo cp /usr/bin/qemu-aarch64-static /opt/rootfs/usr/bin/ 2>/dev/null || true
          sudo cp /etc/resolv.conf /opt/rootfs/etc/resolv.conf 2>/dev/null || true
          sudo chroot /opt/rootfs /bin/bash -c 'export DEBIAN_FRONTEND=noninteractive && apt-get update -qq && apt-get install -y -qq sudo xfce4 xfce4-goodies dbus-x11 xauth mesa-utils alsa-utils pavucontrol pulseaudio firefox vlc ffmpeg mousepad pluma xterm lxterminal thunar thunar-archive-plugin thunar-volman ristretto parole xdg-utils xdg-user-dirs fonts-noto fonts-liberation arc-theme papirus-icon-theme wget curl git htop neofetch tree network-manager network-manager-gnome gnome-screenshot xfce4-screenshooter bash-completion && locale-gen en_US.UTF-8 2>/dev/null || true && apt-get clean && rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*'
          echo "Packages installed"

      - name: Configure XFCE desktop
        run: |
          sudo mkdir -p /opt/rootfs/home/ubuntu/.config/xfce4/xfconf/xfce-perchannel-xml
          sudo mkdir -p /opt/rootfs/home/ubuntu/.config/Mousepad
          sudo mkdir -p /opt/rootfs/home/ubuntu/Wallpapers

          cat << 'XMLEOF' | sudo tee /opt/rootfs/home/ubuntu/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-desktop.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfce4-desktop" version="1.0">
            <property name="backdrop" type="empty">
              <property name="screen0" type="empty">
                <property name="monitorscreen" type="empty">
                  <property name="workspace0" type="empty">
                    <property name="last-image" type="string" value="/usr/share/backgrounds/xfce/xfce-blue.svg"/>
                  </property>
                </property>
              </property>
            </property>
          </channel>
          XMLEOF

          cat << 'XMLEOF' | sudo tee /opt/rootfs/home/ubuntu/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfwm4" version="1.0">
            <property name="general" type="empty">
              <property name="theme" type="string" value="Arc-Dark"/>
              <property name="title_font" type="string" value="Noto Sans Bold 10"/>
            </property>
          </channel>
          XMLEOF

          cat << 'XMLEOF' | sudo tee /opt/rootfs/home/ubuntu/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xsettings" version="1.0">
            <property name="Net" type="empty">
              <property name="ThemeName" type="string" value="Arc-Dark"/>
              <property name="IconThemeName" type="string" value="Papirus-Dark"/>
            </property>
            <property name="Gtk" type="empty">
              <property name="FontName" type="string" value="Noto Sans 10"/>
            </property>
          </channel>
          XMLEOF

          sudo chown -R 1000:1000 /opt/rootfs/home/ubuntu/.config 2>/dev/null || true
          sudo chown -R 1000:1000 /opt/rootfs/home/ubuntu/Wallpapers 2>/dev/null || true
          echo "XFCE configured"

      - name: Create desktop launcher
        run: |
          cat << 'CMD' | sudo tee /opt/rootfs/usr/local/bin/desktop
          #!/usr/bin/env bash
          set -e
          export DISPLAY=:0
          export PULSE_SERVER=tcp:127.0.0.1:4713
          export GALLIUM_DRIVER=virpipe
          unset DBUS_SESSION_BUS_ADDRESS
          USER_RUNTIME_DIR="/run/user/$(id -u)"
          mkdir -p "$USER_RUNTIME_DIR"
          chmod 700 "$USER_RUNTIME_DIR"
          echo -e "\e[1;32m[+] Launching Pre-Built XFCE Desktop...\e[0m"
          sleep 1
          exec dbus-launch --exit-with-session startxfce4
          CMD
          sudo chmod +x /opt/rootfs/usr/local/bin/desktop
          echo "Desktop launcher created"

      - name: Create GPU launcher scripts
        run: |
          cat << 'CMDEOF' | sudo tee /opt/rootfs/usr/local/bin/gpu
          #!/usr/bin/env bash
          set -e
          if [ $# -eq 0 ]; then
              echo "Usage: gpu <command> [args...]"
              echo "Run a command with GPU hardware acceleration."
              exit 1
          fi
          export DISPLAY="${DISPLAY:-:0}"
          export GALLIUM_DRIVER=virpipe
          export MESA_GL_VERSION_OVERRIDE=4.1COMPAT
          export MESA_GLSL_VERSION_OVERRIDE=410
          unset LIBGL_ALWAYS_SOFTWARE
          exec "$@"
          CMDEOF
          sudo chmod +x /opt/rootfs/usr/local/bin/gpu

          cat << 'CMDEOF' | sudo tee /opt/rootfs/usr/local/bin/gpu-info
          #!/usr/bin/env bash
          set -e
          echo "=== GPU Information ==="
          if command -v getprop >/dev/null 2>&1; then
              echo "EGL:     $(getprop ro.hardware.egl 2>/dev/null || echo N/A)"
              echo "Vulkan:  $(getprop ro.hardware.vulkan 2>/dev/null || echo N/A)"
          fi
          echo ""
          echo "=== GPU Processes ==="
          ps -eo pid,cmd 2>/dev/null | grep -i "virgl\|vgl\|angle\|zink" | grep -v grep || echo "  None"
          CMDEOF
          sudo chmod +x /opt/rootfs/usr/local/bin/gpu-info
          echo "GPU launcher scripts created"

      - name: Cleanup and create tarball
        run: |
          sudo rm -rf /opt/rootfs/var/cache/apt/archives/*.deb
          sudo rm -rf /opt/rootfs/var/lib/apt/lists/*
          sudo rm -rf /opt/rootfs/tmp/* /opt/rootfs/var/tmp/*
          sudo rm -rf /opt/rootfs/usr/share/doc/* /opt/rootfs/usr/share/man/*
          sudo rm -f /opt/rootfs/usr/bin/qemu-aarch64-static

          echo "Rootfs size: $(sudo du -sh /opt/rootfs | cut -f1)"

          cd /opt
          sudo tar -czf /tmp/ubuntu-mobile-desktop-rootfs-2.0.0-arm64.tar.gz \
            -C /opt rootfs/ \
            --transform='s|^rootfs|ubuntu-mobile-desktop-rootfs-2.0.0|'

          ls -lh /tmp/ubuntu-mobile-desktop-rootfs-2.0.0-arm64.tar.gz
          echo "Tarball created"

      - name: Create checksum
        run: |
          cd /tmp
          sha256sum ubuntu-mobile-desktop-rootfs-2.0.0-arm64.tar.gz > \
            ubuntu-mobile-desktop-rootfs-2.0.0-arm64.tar.gz.sha256
          cat ubuntu-mobile-desktop-rootfs-2.0.0-arm64.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-tarball
          path: /tmp/ubuntu-mobile-desktop-rootfs-2.0.0-arm64*
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build-rootfs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: rootfs-tarball
          path: /tmp/release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0
          name: "Pre-Built Ubuntu Desktop v2.0.0"
          body: |
            ## Pre-Built Ubuntu Desktop for Android — v2.0.0
            
            Pre-built Ubuntu 22.04 ARM64 rootfs with XFCE desktop, GPU auto-detection, and performance optimization.
            
            ### What's New in v2.0.0
            - **GPU Auto-Detection:** Turnip+Zink for Adreno, VirGL+ANGLE for Mali
            - **Performance Commands:** `gpu`, `gpu-info`, `benchmark-gpu`, `optimize-desktop`
            - **Thermal Monitoring:** `monitor-thermal`
            - Better memory management and process cleanup
            
            ### What's Included
            - Ubuntu 22.04 (Jammy) ARM64
            - XFCE4 Desktop with Arc-Dark theme, Papirus-Dark icons
            - Firefox, VLC, File Manager, Terminal, Text Editor
            - Pre-configured panel, shortcuts, wallpapers
            - Audio (PulseAudio) + GPU (VirGL/Turnip/ANGLE) support
            
            ### Quick Install
            ```bash
            git clone https://github.com/adittaya/ubuntu-mobile-desktop.git
            cd ubuntu-mobile-desktop
            bash setup-all.sh --fast
            ```
            
            ### Verify Checksum
            ```bash
            sha256sum -c ubuntu-mobile-desktop-rootfs-2.0.0-arm64.tar.gz.sha256
            ```
          files: |
            /tmp/release/ubuntu-mobile-desktop-rootfs-2.0.0-arm64.tar.gz
            /tmp/release/ubuntu-mobile-desktop-rootfs-2.0.0-arm64.tar.gz.sha256
          draft: false
          prerelease: false
